name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/xiamuceer-j/EasyProxiesV2.git || true
          git fetch upstream

      - name: Sync upstream main into fork main
        run: |
          git checkout main
          git merge --ff-only upstream/main || {
            echo "Fast-forward failed; trying hard reset to upstream/main"
            git reset --hard upstream/main
          }

      - name: Restore Docker workflow if upstream removed it
        run: |
          mkdir -p .github/workflows
          cat > .github/workflows/docker-publish.yml <<'YAML'
          name: Docker Publish

          on:
            push:
              branches:
                - main
              tags:
                - 'v*'
            workflow_dispatch:

          permissions:
            contents: read
            packages: write

          env:
            IMAGE_NAME: easyproxiesv2
            GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/easyproxiesv2
            DOCKERHUB_IMAGE: docker.io/fzx401/easyproxiesv2

          jobs:
            docker:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Set up QEMU
                  uses: docker/setup-qemu-action@v3

                - name: Set up Docker Buildx
                  uses: docker/setup-buildx-action@v3

                - name: Log in to GHCR
                  uses: docker/login-action@v3
                  with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

                - name: Log in to Docker Hub
                  uses: docker/login-action@v3
                  with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

                - name: Extract Docker metadata
                  id: meta
                  uses: docker/metadata-action@v5
                  with:
                    images: |
                      ${{ env.GHCR_IMAGE }}
                      ${{ env.DOCKERHUB_IMAGE }}
                    tags: |
                      type=ref,event=branch
                      type=ref,event=tag
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha

                - name: Build and push Docker image
                  uses: docker/build-push-action@v6
                  with:
                    context: .
                    file: ./Dockerfile
                    platforms: linux/amd64,linux/arm64
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
          YAML

      - name: Commit and push if changed
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "chore: sync upstream"
          git push origin main
